version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
    # Uncomment to use .env file
    # env_file:
    #   - ./backend/.env

